<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Neem contact op met Nico van der Woude.">
  <title>Contact – Nico van der Woude</title>
  <link rel="dns-prefetch" href="https://firestore.googleapis.com">
  <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ========== NAVIGATIE ========== -->
  <nav class="navbar" role="navigation" aria-label="Hoofdnavigatie">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">✍️ Nico van der Woude</a>

      <!-- Hamburger knop (alleen zichtbaar op mobiel) -->
      <button class="hamburger" id="hamburger-btn" aria-label="Menu openen" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

      <ul class="navbar-links" id="navbar-links">
        <li><a href="index.html">🏠 Home</a></li>
        <li><a href="blog.html">📰 Blog</a></li>
        <li><a href="contact.html" class="active">📬 Contact</a></li>
        <!-- Dashboard-link: alleen zichtbaar als admin is ingelogd -->
        <li id="nav-dashboard" style="display:none;">
          <a href="dashboard.html">⚙️ Dashboard</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- ========== HERO ========== -->
  <div class="hero">
    <h1>Contact</h1>
    <p>Stuur een bericht en ik neem zo snel mogelijk contact met je op.</p>
  </div>

  <!-- ========== CONTACT FORMULIER ========== -->
  <div class="container">

    <div class="contact-wrapper">

      <form id="contact-form" class="contact-form" novalidate>

        <div class="form-group">
          <label for="contact-name">Jouw naam *</label>
          <input
            type="text"
            id="contact-name"
            placeholder="Bijv. Jan de Vries"
            required
            maxlength="100"
            autocomplete="name">
        </div>

        <div class="form-group">
          <label for="contact-email">E-mailadres *</label>
          <input
            type="email"
            id="contact-email"
            placeholder="naam@voorbeeld.nl"
            required
            autocomplete="email">
        </div>

        <div class="form-group">
          <label for="contact-subject">Onderwerp</label>
          <input
            type="text"
            id="contact-subject"
            placeholder="Waar gaat je bericht over?"
            maxlength="200">
        </div>

        <div class="form-group">
          <label for="contact-message">Bericht *</label>
          <textarea
            id="contact-message"
            placeholder="Schrijf hier je bericht..."
            required
            minlength="10"
            maxlength="3000"
            rows="6"></textarea>
        </div>

        <div id="contact-feedback" role="alert" style="margin-bottom:1rem;font-size:.85rem;"></div>

        <button type="submit" class="btn btn-primary">
          📨 Bericht versturen
        </button>

      </form>

    </div>

  </div>

  <!-- ========== FOOTER ========== -->
  <footer>
    <p>
      &copy; <span id="year"></span> Nico van der Woude &mdash;
      Gebouwd door Jo&euml;l Wielstra
    </p>
  </footer>

  <!-- ========== SCRIPTS ========== -->
  <script type="module" src="/js/contact.js"></script>

</body>
</html>
