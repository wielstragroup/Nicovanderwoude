<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Neem contact op met Nico van der Woude.">
  <title>Contact – Nico van der Woude</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ========== NAVIGATIE ========== -->
  <nav class="navbar" role="navigation" aria-label="Hoofdnavigatie">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">✍️ Nico van der Woude</a>

      <!-- Hamburger knop (alleen zichtbaar op mobiel) -->
      <button class="hamburger" id="hamburger-btn" aria-label="Menu openen" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

      <ul class="navbar-links" id="navbar-links">
        <li><a href="index.html">🏠 Home</a></li>
        <li><a href="blog.html">📰 Blog</a></li>
        <li><a href="contact.html" class="active">📬 Contact</a></li>
        <!-- Dashboard-link: alleen zichtbaar als admin is ingelogd -->
        <li id="nav-dashboard" style="display:none;">
          <a href="dashboard.html">⚙️ Dashboard</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- ========== HERO ========== -->
  <div class="hero">
    <h1>Contact</h1>
    <p>Stuur een bericht en ik neem zo snel mogelijk contact met je op.</p>
  </div>

  <!-- ========== CONTACT FORMULIER ========== -->
  <div class="container">

    <div class="contact-wrapper">

      <form id="contact-form" class="contact-form" novalidate>

        <div class="form-group">
          <label for="contact-name">Jouw naam *</label>
          <input
            type="text"
            id="contact-name"
            placeholder="Bijv. Jan de Vries"
            required
            maxlength="100"
            autocomplete="name">
        </div>

        <div class="form-group">
          <label for="contact-email">E-mailadres *</label>
          <input
            type="email"
            id="contact-email"
            placeholder="naam@voorbeeld.nl"
            required
            autocomplete="email">
        </div>

        <div class="form-group">
          <label for="contact-subject">Onderwerp</label>
          <input
            type="text"
            id="contact-subject"
            placeholder="Waar gaat je bericht over?"
            maxlength="200">
        </div>

        <div class="form-group">
          <label for="contact-message">Bericht *</label>
          <textarea
            id="contact-message"
            placeholder="Schrijf hier je bericht..."
            required
            minlength="10"
            maxlength="3000"
            rows="6"></textarea>
        </div>

        <div id="contact-feedback" role="alert" style="margin-bottom:1rem;font-size:.85rem;"></div>

        <button type="submit" class="btn btn-primary">
          📨 Bericht versturen
        </button>

      </form>

    </div>

  </div>

  <!-- ========== FOOTER ========== -->
  <footer>
    <p>
      &copy; <span id="year"></span> Nico van der Woude &mdash;
      Gebouwd door Jo&euml;l Wielstra
    </p>
  </footer>

  <!-- ========== FIREBASE SDK (via CDN) ========== -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

  <!-- Firebase configuratie en initialisatie -->
  <script src="js/firebase-config.js"></script>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Hamburger menu toggle voor mobiel
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const navbarLinks  = document.getElementById('navbar-links');

    hamburgerBtn.addEventListener('click', () => {
      const isOpen = navbarLinks.classList.toggle('open');
      hamburgerBtn.setAttribute('aria-expanded', isOpen);
    });

    document.addEventListener('click', e => {
      if (!hamburgerBtn.contains(e.target) && !navbarLinks.contains(e.target)) {
        navbarLinks.classList.remove('open');
        hamburgerBtn.setAttribute('aria-expanded', 'false');
      }
    });

    // Toon dashboard-link als admin is ingelogd
    auth.onAuthStateChanged(user => {
      const navDash = document.getElementById('nav-dashboard');
      if (navDash) navDash.style.display = user ? 'inline-block' : 'none';
    });

    // Contactformulier verwerken: sla bericht op in Firestore
    const contactForm     = document.getElementById('contact-form');
    const contactFeedback = document.getElementById('contact-feedback');

    contactForm.addEventListener('submit', async e => {
      e.preventDefault();
      contactFeedback.textContent = '';
      contactFeedback.style.color = '';

      const name    = document.getElementById('contact-name').value.trim();
      const email   = document.getElementById('contact-email').value.trim();
      const subject = document.getElementById('contact-subject').value.trim();
      const message = document.getElementById('contact-message').value.trim();

      if (!name || !email || !message) {
        contactFeedback.textContent = '⚠️ Vul alle verplichte velden in.';
        contactFeedback.style.color = '#c0392b';
        return;
      }

      const submitBtn = contactForm.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Versturen...';

      try {
        await db.collection('contact_messages').add({
          name,
          email,
          subject,
          message,
          read:      false,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        contactForm.reset();
        contactFeedback.textContent = '✅ Bericht verzonden! Ik neem zo snel mogelijk contact met je op.';
        contactFeedback.style.color = '#4a9268';
      } catch (err) {
        console.error('Fout bij versturen bericht:', err);
        contactFeedback.textContent = '❌ Er is iets misgegaan. Probeer het opnieuw.';
        contactFeedback.style.color = '#c0392b';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '📨 Bericht versturen';
      }
    });
  </script>

</body>
</html>
